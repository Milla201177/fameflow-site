<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FameFlow</title>
    <style>
      :root {
        --bg: #f7f7fa;
        --surface: #ffffff;
        --lavender: #dbd4fa;
        --primary: #8f7cf6;
        --mint: #c6fce4;
        --ink: #1e1e24;
        --muted: #6f6f7a;
        --line: #e8e6f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 40px;
        background:
          radial-gradient(circle at 20% 0%, rgba(219, 212, 250, 0.55), transparent 34%),
          linear-gradient(180deg, #fbfbfd, var(--bg));
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 980px);
        display: grid;
        gap: 24px;
      }

      header {
        display: grid;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 1;
      }

      p {
        max-width: 680px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 28px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      a {
        min-height: 220px;
        display: grid;
        align-content: space-between;
        gap: 20px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 18px 42px rgba(31, 28, 45, 0.08);
      }

      a strong {
        display: block;
        font-size: 24px;
        line-height: 30px;
      }

      a span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        line-height: 22px;
      }

      .mark {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--lavender);
      }

      .site .mark {
        background: var(--primary);
      }

      .app .mark {
        background: var(--mint);
      }

      @media (max-width: 760px) {
        body {
          padding: 24px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>FameFlow</h1>
        <p>Separate entry points for the desktop site, the mobile app prototype, and the design component kit.</p>
      </header>
      <section class="grid" aria-label="FameFlow sections">
        <a class="site" href="site/index.html">
          <span class="mark" aria-hidden="true"></span>
          <span>
            <strong>Site</strong>
            <span>Desktop web workspace version.</span>
          </span>
        </a>
        <a class="app" href="app/index.html">
          <span class="mark" aria-hidden="true"></span>
          <span>
            <strong>App</strong>
            <span>Mobile app prototype version.</span>
          </span>
        </a>
        <a href="design/outputs/svg-components/00-fameflow-component-kit-annotated.svg">
          <span class="mark" aria-hidden="true"></span>
          <span>
            <strong>Design</strong>
            <span>Component SVG kit and annotated specs.</span>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
