      <rect x="180" y="166" width="138" height="48" rx="16" fill="#8F7CF6" stroke="none" stroke-width="1" />
      <text x="249" y="197" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" text-anchor="middle">Continue</text>
    
