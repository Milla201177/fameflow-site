<?xml version="1.0" encoding="UTF-8"?>
<svg width="342" height="238" viewBox="0 0 342 238" fill="none" xmlns="http://www.w3.org/2000/svg">
<title>FameFlow component</title>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E1E24" flood-opacity="0.10"/>
  </filter>
  <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
    <stop stop-color="#DBD4FA"/>
    <stop offset="1" stop-color="#8F7CF6"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0" y1="0" x2="120" y2="96" gradientUnits="userSpaceOnUse">
    <stop stop-color="#C6FCE4"/>
    <stop offset="1" stop-color="#67D7AA"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0" y1="0" x2="140" y2="96" gradientUnits="userSpaceOnUse">
    <stop stop-color="#F5F1FF"/>
    <stop offset="1" stop-color="#DBD4FA"/>
  </linearGradient>
  
</defs>

      <rect x="0" y="0" width="342" height="238" rx="24" fill="#FFFFFF" stroke="#E8E6F2" stroke-width="1" filter="url(#shadow)"/>
      <text x="24" y="42" fill="#1E1E24" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0" text-anchor="start">Add cash</text>
      <text x="24" y="70" fill="#6F6F7A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Choose amount</text>
      <rect x="24" y="94" width="86" height="36" rx="18" fill="#8F7CF6" stroke="#8F7CF6" stroke-width="1" /><text x="67" y="117" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0" text-anchor="middle">$25</text>
      <rect x="128" y="94" width="86" height="36" rx="18" fill="#FFFFFF" stroke="#E8E6F2" stroke-width="1" /><text x="171" y="117" fill="#1E1E24" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0" text-anchor="middle">$50</text>
      <rect x="232" y="94" width="86" height="36" rx="18" fill="#FFFFFF" stroke="#E8E6F2" stroke-width="1" /><text x="275" y="117" fill="#1E1E24" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0" text-anchor="middle">$100</text>
      <rect x="24" y="166" width="138" height="48" rx="16" fill="#FFFFFF" stroke="#E8E6F2" stroke-width="1" />
